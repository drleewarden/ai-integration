<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Creative Milk Static Banner Ads</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #0f1526;
        --cream: #f5f0e8;
        --paper: #faf8f4;
        --gold: #c9a84c;
        --slate: #4a4e60;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Syne, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 36px 0 56px;
      }

      h1 {
        margin: 0 0 8px;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 34px;
        line-height: 1;
      }

      p {
        margin: 0 0 28px;
        color: var(--slate);
      }

      section {
        display: grid;
        gap: 18px;
        margin-top: 28px;
      }

      figure {
        margin: 0;
        padding: 18px;
        overflow: auto;
        background: white;
        border: 1px solid rgba(15, 21, 38, 0.12);
        border-radius: 8px;
        box-shadow: 0 18px 60px rgba(15, 21, 38, 0.08);
      }

      figcaption {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 12px;
        font-size: 13px;
        color: var(--slate);
      }

      a {
        color: var(--ink);
        text-decoration-color: var(--gold);
        text-underline-offset: 3px;
      }

      img {
        display: block;
        max-width: none;
        background: var(--cream);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Creative Milk Static Banner Ads</h1>
      <p>SVG masters are self-contained. PNG files are included as upload-friendly previews.</p>

      <section>
        <figure>
          <figcaption>
            <span>Medium rectangle, 300 x 250</span>
            <a href="./creative-milk-ai-audit-300x250.svg">Open SVG</a>
          </figcaption>
          <img src="./creative-milk-ai-audit-300x250.svg" width="300" height="250" alt="Creative Milk AI audit 300 by 250 banner" />
        </figure>

        <figure>
          <figcaption>
            <span>Leaderboard, 728 x 90</span>
            <a href="./creative-milk-ai-audit-728x90.svg">Open SVG</a>
          </figcaption>
          <img src="./creative-milk-ai-audit-728x90.svg" width="728" height="90" alt="Creative Milk AI audit 728 by 90 banner" />
        </figure>

        <figure>
          <figcaption>
            <span>Skyscraper, 160 x 600</span>
            <a href="./creative-milk-ai-audit-160x600.svg">Open SVG</a>
          </figcaption>
          <img src="./creative-milk-ai-audit-160x600.svg" width="160" height="600" alt="Creative Milk AI audit 160 by 600 banner" />
        </figure>

        <figure>
          <figcaption>
            <span>Square, 1080 x 1080</span>
            <a href="./creative-milk-ai-audit-1080x1080.svg">Open SVG</a>
          </figcaption>
          <img src="./creative-milk-ai-audit-1080x1080.svg" width="540" height="540" alt="Creative Milk AI audit square static ad" />
        </figure>
      </section>
    </main>
  </body>
</html>
